name: Update Latest Commit in Profile README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest commit info
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_HASH=$(git log -1 --pretty=format:"%h")
          COMMIT_DATE=$(git log -1 --pretty=format:"%cd" --date=short)
          echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Update README section
        shell: python
        run: |
          import re

          hash_val = "${{ steps.commit.outputs.hash }}"
          msg_val = "${{ steps.commit.outputs.message }}"
          date_val = "${{ steps.commit.outputs.date }}"
          
          new_block = f"<!-- LATEST_COMMIT_START -->\nLatest commit: `{hash_val}` - {msg_val} ({date_val})\n<!-- LATEST_COMMIT_END -->"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          pattern = r"<!-- LATEST_COMMIT_START -->.*?<!-- LATEST_COMMIT_END -->"
          updated_content = re.sub(pattern, new_block, content, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_content)

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update latest commit in README" || exit 0
          git push
